name: HTTP单元测试

on:
  push:
    paths:
      - 'DeepPupils/probe/test/**'
      - 'DeepPupils/probe/docker/**'
      - '.github/workflows/probe_test-http.yml'
    branches:
      - main
  pull_request:
    paths:
      - 'DeepPupils/probe/test/**'
      - 'DeepPupils/probe/docker/**'
      - '.github/workflows/probe_test-http.yml'
  workflow_dispatch:

jobs:
  generate-pcap:
    name: 生成流量
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scapy
        run: pip install scapy

      - name: 生成 11 个场景 pcap
        run: |
          mkdir -p DeepPupils/probe/test/pcap
          cd DeepPupils/probe/test
          python3 http_traffic.py -s auth -o pcap/http_auth.pcap -c 3
          python3 http_traffic.py -s proxy -o pcap/http_proxy.pcap -c 3
          python3 http_traffic.py -s cookies -o pcap/http_cookies.pcap -c 3
          python3 http_traffic.py -s body -o pcap/http_body.pcap -c 3
          python3 http_traffic.py -s headers -o pcap/http_headers.pcap -c 3
          python3 http_traffic.py -s methods -o pcap/http_methods.pcap -c 1
          python3 http_traffic.py -s status -o pcap/http_status.pcap -c 1
          python3 http_traffic.py -s boundary_large_header -o pcap/http_boundary_large_header.pcap -c 1
          python3 http_traffic.py -s boundary_large_body -o pcap/http_boundary_large_body.pcap -c 1
          python3 http_traffic.py -s boundary_special_char -o pcap/http_boundary_special_char.pcap -c 1
          python3 http_traffic.py -s boundary_mixed_encoding -o pcap/http_boundary_mixed_encoding.pcap -c 1
          ls -la pcap/

      - name: Upload pcap
        uses: actions/upload-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/
          retention-days: 1

  zeek-analysis:
    name: Zeek分析
    runs-on: ubuntu-latest
    needs: generate-pcap
    steps:
      - name: Download pcap
        uses: actions/download-artifact@v4
        with:
          name: http-pcaps
          path: pcap

      - name: 运行 Zeek 分析
        run: |
          PCAP_DIR=$(pwd)
          mkdir -p zeek_output
          for pcap in pcap/*.pcap; do
            name=$(basename "$pcap" .pcap)
            docker run --rm \
              -v $(pwd):/pcap \
              -v $(pwd)/zeek_output:/output \
              ghcr.io/cxiyuan/probe:latest \
              zeek -r "/pcap/$pcap" -j > "/output/${name}.json" 2>&1 || echo "[]" > "/output/${name}.json"
          done
          ls -la zeek_output/

      - name: Upload zeek output
        uses: actions/upload-artifact@v4
        with:
          name: zeek-output
          path: zeek_output/
          retention-days: 1

  field-assertion:
    name: 字段断言
    runs-on: ubuntu-latest
    needs: zeek-analysis
    steps:
      - name: Download zeek output
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: zeek_output

      - name: jq 字段存在性检查
        run: |
          set -e
          echo "=== 字段存在性检查 ==="
          for json in zeek_output/*.json; do
            echo "检查: $json"
            # 基础字段存在性检查（任一记录有该字段即 PASS）
            jq -e 'any(.[]; .http.host != null)' "$json" && echo "  [PASS] host" || { echo "  [FAIL] host"; exit 1; }
            jq -e 'any(.[]; .http.uri != null)' "$json" && echo "  [PASS] uri" || { echo "  [FAIL] uri"; exit 1; }
            jq -e 'any(.[]; .http.user_agent != null)' "$json" && echo "  [PASS] user_agent" || { echo "  [FAIL] user_agent"; exit 1; }
            jq -e 'any(.[]; .http.status_code != null)' "$json" && echo "  [PASS] status_code" || { echo "  [FAIL] status_code"; exit 1; }
            echo "---"
          done
          echo "=== 全部字段存在性检查通过 ==="

  pytest-test:
    name: pytest精确验证
    runs-on: ubuntu-latest
    needs: zeek-analysis
    continue-on-error: true
    steps:
      - name: Download zeek output
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: zeek_output

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run pytest
        run: |
          python3 -m pytest DeepPupils/probe/test/test_http.py -v --tb=short || echo "pytest 有失败用例"

      - name: Upload pytest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: pytest_report/
          retention-days: 1