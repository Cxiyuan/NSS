# Probe 模块化流水线
# 入口触发器 + Docker 镜像构建 job，后续可扩展 unit-test、publish 等 job

name: Probe-构建镜像

on:
  push:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  workflow_dispatch:

jobs:
  # ============================================================
  # [基础 Job] 构建 Docker 镜像并推送到 GHCR
  # ============================================================
  build-image:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/cxiyuan/probe
          tags: |
            latest
            ${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DeepPupils/probe/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # [扩展 Slot 1] 单元测试（预留，待实现）
  # ============================================================
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: build-image
    # permissions: inherit  # 继承 workflow 级别权限

    steps:
      - name: Placeholder - 待实现单元测试
        run: |
          echo "单元测试 slot 已预留，等待实现"
