# Probe 模块化流水线
# 构建镜像 -> 单元测试（HTTP解析字段验证）-> 发布

name: Probe-构建镜像

on:
  push:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cxiyuan/probe

jobs:
  # ============================================================
  # [Job 1] 构建 Docker 镜像并推送到 GHCR
  # ============================================================
  build-image:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable=${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DeepPupils/probe/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # [Job 2] 单元测试 — 生成测试流量
  # ============================================================
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scapy
        run: pip install scapy

      - name: 生成测试流量
        run: |
          mkdir -p DeepPupils/probe/test/pcap
          cd DeepPupils/probe/test
          python3 http_traffic.py -s auth -o pcap/http_auth.pcap -c 1
          python3 http_traffic.py -s proxy -o pcap/http_proxy.pcap -c 1
          python3 http_traffic.py -s cookies -o pcap/http_cookies.pcap -c 1
          python3 http_traffic.py -s body -o pcap/http_body.pcap -c 1
          python3 http_traffic.py -s headers -o pcap/http_headers.pcap -c 1
          python3 http_traffic.py -s methods -o pcap/http_methods.pcap -c 1
          python3 http_traffic.py -s status -o pcap/http_status.pcap -c 1
          python3 http_traffic.py -s boundary_large_header -o pcap/http_boundary_large_header.pcap -c 1
          python3 http_traffic.py -s boundary_large_body -o pcap/http_boundary_large_body.pcap -c 1
          python3 http_traffic.py -s boundary_special_char -o pcap/http_boundary_special_char.pcap -c 1
          python3 http_traffic.py -s boundary_mixed_encoding -o pcap/http_boundary_mixed_encoding.pcap -c 1
          ls -la pcap/

      - name: 上传流量文件
        uses: actions/upload-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/
          retention-days: 1

  # ============================================================
  # [Job 3] Zeek 分析 — 使用 probe 镜像分析流量
  # ============================================================
  zeek-analysis:
    name: Zeek分析
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 下载流量文件
        uses: actions/download-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/

      - name: 运行 Zeek 分析
        timeout-minutes: 5
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cd DeepPupils/probe/test/pcap
          echo "=== pcap files ==="
          ls -la

          # 验证 http-extend 扩展是否在镜像中注册成功
          echo "=== verify http-extend in zeek scripts ==="
          docker run --rm ${{ env.IMAGE_NAME }}:${{ github.sha }} zeek -N 2>&1 | grep -i "http-extend" && echo "[PASS] http-extend found" || echo "[FAIL] http-extend NOT found"

          # 在 docker 之前创建输出目录，避免 root 权限问题
          mkdir -p ../zeek_output

          for pcap in *.pcap; do
            name=$(basename "$pcap" .pcap)
            echo "=== Processing $pcap ==="
            tmpdir="../zeek_output/tmp_${name}"
            rm -rf "$tmpdir"
            mkdir -p "$tmpdir"

            docker run --rm \
              -v "$(pwd):/pcap:ro" \
              -v "$(pwd)/${tmpdir}:/output" \
              ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              sh -c "cd /output && zeek -r /pcap/${pcap} /opt/probe/extend/http-extend"

            echo "--- generated log files ---"
            ls -la "$tmpdir/"

            python3 ../convert_zeek_logs.py "${tmpdir}/http.log" "../zeek_output/${name}.json"

            rm -rf "$tmpdir"
          done

          echo "=== Zeek output ==="
          ls -la ../zeek_output/
          shopt -s nullglob
          for json in ../zeek_output/*.json; do
            count=$(wc -l < "$json" | tr -d ' ')
            echo "$(basename $json): ${count} records"
          done

      - name: 上传 Zeek 输出
        uses: actions/upload-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/
          retention-days: 1

  # ============================================================
  # [Job 4] 字段断言 — jq 批量检查字段存在性
  # ============================================================
  field-assertion:
    name: 字段断言
    runs-on: ubuntu-latest
    needs: zeek-analysis

    steps:
      - name: 下载 Zeek 输出
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/

      - name: jq 标准字段检查
        run: |
          cd DeepPupils/probe/test/zeek_output
          shopt -s nullglob
          for json in *.json; do
            if [ ! -s "$json" ]; then
              echo "[SKIP] $json is empty, skipping validation"
              continue
            fi
            jq -s -e 'any(.[]; .http.host != null)' "$json" && echo "[PASS] $json host" || { echo "[FAIL] $json host"; exit 1; }
            jq -s -e 'any(.[]; .http.uri != null)' "$json" && echo "[PASS] $json uri" || { echo "[FAIL] $json uri"; exit 1; }
            jq -s -e 'any(.[]; .http.user_agent != null)' "$json" && echo "[PASS] $json user_agent" || { echo "[FAIL] $json user_agent"; exit 1; }
            jq -s -e 'any(.[]; .http.status_code != null)' "$json" && echo "[PASS] $json status_code" || { echo "[FAIL] $json status_code"; exit 1; }
          done

      - name: jq 自定义扩展字段检查
        run: |
          cd DeepPupils/probe/test/zeek_output
          shopt -s nullglob
          echo "=== Verify http-extend fields exist (column presence) ==="
          for json in *.json; do
            if [ ! -s "$json" ]; then
              continue
            fi
            # 核心扩展字段列必须全部存在（证明 http-extend.zeek 已加载）
            jq -s -e "any(.[]; .http | has(\"authorizations\")) and any(.[]; .http | has(\"cookies\")) and any(.[]; .http | has(\"xff\"))" "$json" \
              && echo "[PASS] $json: extension columns present" \
              || { echo "[FAIL] $json: extension columns missing — http-extend may not be loaded"; exit 1; }
          done

          echo "=== Verify extension field values in scenario files ==="
          # http_auth.json 必须有 Authorization 头
          jq -s -e 'any(.[]; .http.authorizations != null and .http.authorizations != "")' http_auth.json \
            && echo "[PASS] http_auth.json: authorizations has value" \
            || { echo "[FAIL] http_auth.json: authorizations is empty"; exit 1; }

          # http_cookies.json 必须有 Cookie 头
          jq -s -e 'any(.[]; .http.cookies != null and .http.cookies != "")' http_cookies.json \
            && echo "[PASS] http_cookies.json: cookies has value" \
            || { echo "[FAIL] http_cookies.json: cookies is empty"; exit 1; }

          # http_proxy.json 必须有 X-Forwarded-For
          jq -s -e 'any(.[]; .http.xff != null and .http.xff != "")' http_proxy.json \
            && echo "[PASS] http_proxy.json: xff has value" \
            || { echo "[FAIL] http_proxy.json: xff is empty"; exit 1; }

  # ============================================================
  # [Job 5] pytest 精确值验证（可选失败不阻塞）
  # ============================================================
  pytest-test:
    name: pytest精确验证
    runs-on: ubuntu-latest
    needs: zeek-analysis
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 下载 Zeek 输出
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 pytest
        run: pip install pytest

      - name: 运行 pytest
        run: |
          cd DeepPupils/probe/test
          python3 -m pytest test_http.py -v --tb=short || echo "pytest 有失败用例"

  # ============================================================
  # [Job 6] 发布（预留）
  # ============================================================
  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs: [build-image, field-assertion]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Placeholder
        run: echo "发布 slot 已预留"