# Probe 模块化流水线
# 构建镜像 -> 单元测试（HTTP解析字段验证）-> 发布

name: Probe-构建镜像

on:
  push:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cxiyuan/probe

jobs:
  # ============================================================
  # [Job 1] 构建 Docker 镜像并推送到 GHCR
  # ============================================================
  build-image:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DeepPupils/probe/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHE_BUST=${{ github.run_id }}

  # ============================================================
  # [Job 2] 单元测试 — 生成测试流量
  # ============================================================
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scapy
        run: pip install scapy

      - name: 生成测试流量
        run: |
          mkdir -p DeepPupils/probe/test/pcap
          cd DeepPupils/probe/test
          python3 http_traffic.py -s auth -o pcap/http_auth.pcap -c 3
          python3 http_traffic.py -s proxy -o pcap/http_proxy.pcap -c 1
          python3 http_traffic.py -s cookies -o pcap/http_cookies.pcap -c 1
          python3 http_traffic.py -s body -o pcap/http_body.pcap -c 1
          python3 http_traffic.py -s headers -o pcap/http_headers.pcap -c 1
          python3 http_traffic.py -s methods -o pcap/http_methods.pcap -c 1
          python3 http_traffic.py -s status -o pcap/http_status.pcap -c 1
          python3 http_traffic.py -s boundary_large_header -o pcap/http_boundary_large_header.pcap -c 1
          python3 http_traffic.py -s boundary_large_body -o pcap/http_boundary_large_body.pcap -c 1
          python3 http_traffic.py -s boundary_special_char -o pcap/http_boundary_special_char.pcap -c 1
          python3 http_traffic.py -s boundary_mixed_encoding -o pcap/http_boundary_mixed_encoding.pcap -c 1
          python3 http_traffic.py -s multicast -o pcap/http_multicast.pcap -c 1
          python3 http_traffic.py -s http_files -o pcap/http_http_files.pcap -c 1
          python3 conn_traffic.py -o pcap/conn.pcap -c 3
          python3 dns_traffic.py -o pcap/dns.pcap -c 3
          python3 ssh_traffic.py -o pcap/ssh.pcap -c 3
          python3 ssl_traffic.py -o pcap/ssl.pcap -c 3
          ls -la pcap/

      - name: 上传流量文件
        uses: actions/upload-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/
          retention-days: 1

  # ============================================================
  # [Job 3] Zeek 分析 — 使用 probe 镜像分析流量
  # ============================================================
  zeek-analysis:
    name: Zeek分析
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 下载流量文件
        uses: actions/download-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/

      - name: 运行 Zeek 分析
        timeout-minutes: 5
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cd DeepPupils/probe/test/pcap
          echo "=== pcap files ==="
          ls -la

          # 在 docker 之前创建输出目录，避免 root 权限问题
          mkdir -p ../zeek_output

          for pcap in *.pcap; do
            name=$(basename "$pcap" .pcap)
            echo "=== Processing $pcap ==="
            tmpdir="../zeek_output/tmp_${name}"
            rm -rf "$tmpdir"
            mkdir -p "$tmpdir"

            # 根据 pcap 名称选择 Zeek 扩展脚本和日志类型
            case "$name" in
              http_multicast)
                scripts="/opt/probe/extend/http-extend.zeek"
                bpf="-f"
                bpf_val="not net 224.0.0.0/4 and not net ff00::/8"
                logfile="http.log"
                kind="http"
                ;;
              http_*)
                scripts="/opt/probe/extend/http-extend.zeek"
                bpf=""
                bpf_val=""
                logfile="http.log"
                kind="http"
                ;;
              conn)
                scripts=""
                bpf=""
                bpf_val=""
                logfile="conn.log"
                kind="conn"
                ;;
              dns)
                scripts=""
                bpf=""
                bpf_val=""
                logfile="dns.log"
                kind="dns"
                ;;
              ssh)
                scripts=""
                bpf=""
                bpf_val=""
                logfile="ssh.log"
                kind="ssh"
                ;;
              ssl)
                scripts=""
                bpf=""
                bpf_val=""
                logfile="ssl.log"
                kind="ssl"
                ;;
              *)
                echo "[SKIP] $name: unknown scenario, skipping"
                continue
                ;;
            esac

            docker run --rm \
              -v "$(pwd):/pcap:ro" \
              -v "$(pwd)/${tmpdir}:/output" \
              -w /output \
              --entrypoint zeek \
              ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              -r /pcap/${pcap} ${bpf} ${bpf_val} ${scripts}

            echo "--- generated log files ---"
            ls -la "$tmpdir/"

            python3 ../convert_zeek_logs.py "${tmpdir}/${logfile}" "../zeek_output/${name}.json" "${kind}"

            # http_files 场景额外转换 files.log (Zeek Files 框架)
            if [ "$name" = "http_http_files" ]; then
              python3 ../convert_zeek_logs.py "${tmpdir}/files.log" "../zeek_output/${name}_files.json" files
            fi

            # 组播过滤验收：验证 conn.log 中无组播目标 IP
            if [ "$name" = "http_multicast" ]; then
              python3 ../verify_multicast.py "${tmpdir}/conn.log"
            fi

            rm -rf "$tmpdir"
          done

          echo "=== Zeek output ==="
          ls -la ../zeek_output/
          shopt -s nullglob
          for json in ../zeek_output/*.json; do
            count=$(wc -l < "$json" | tr -d ' ')
            echo "$(basename $json): ${count} records"
          done

      - name: 上传 Zeek 输出
        uses: actions/upload-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/
          retention-days: 1

  # ============================================================
  # [Job 4] 字段断言 — jq 批量检查字段存在性
  # ============================================================
  field-assertion:
    name: 字段断言
    runs-on: ubuntu-latest
    needs: zeek-analysis

    steps:
      - name: 下载 Zeek 输出
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/

      - name: jq 标准字段检查
        run: |
          cd DeepPupils/probe/test/zeek_output
          shopt -s nullglob
          for json in *.json; do
            [[ "$json" == *_files.json ]] && continue
            if [ ! -s "$json" ]; then
              echo "[SKIP] $json is empty, skipping validation"
              continue
            fi
            jq -s -e 'any(.[]; .http.host != null)' "$json" && echo "[PASS] $json host" || { echo "[FAIL] $json host"; exit 1; }
            jq -s -e 'any(.[]; .http.uri != null)' "$json" && echo "[PASS] $json uri" || { echo "[FAIL] $json uri"; exit 1; }
            jq -s -e 'any(.[]; .http.user_agent != null)' "$json" && echo "[PASS] $json user_agent" || { echo "[FAIL] $json user_agent"; exit 1; }
            jq -s -e 'any(.[]; .http.status_code != null)' "$json" && echo "[PASS] $json status_code" || { echo "[FAIL] $json status_code"; exit 1; }
          done

      - name: jq 自定义扩展字段检查
        run: |
          cd DeepPupils/probe/test/zeek_output
          shopt -s nullglob
          echo "=== Verify http-extend fields exist (column presence) ==="
          for json in *.json; do
            [[ "$json" == *_files.json ]] && continue
            if [ ! -s "$json" ]; then
              continue
            fi
            # 核心扩展字段列必须全部存在（证明 http-extend.zeek 已加载）
            jq -s -e "any(.[]; .http | has(\"authorizations\")) and any(.[]; .http | has(\"cookies\")) and any(.[]; .http | has(\"xff\"))" "$json" \
              && echo "[PASS] $json: extension columns present" \
              || { echo "[FAIL] $json: extension columns missing — http-extend may not be loaded"; exit 1; }
          done

          echo "=== Verify extension field values in scenario files ==="
          # http_auth.json 必须有 Authorization 头
          jq -s -e 'any(.[]; .http.authorizations != null and .http.authorizations != "")' http_auth.json \
            && echo "[PASS] http_auth.json: authorizations has value" \
            || { echo "[FAIL] http_auth.json: authorizations is empty"; exit 1; }

          # http_cookies.json 必须有 Cookie 头
          jq -s -e 'any(.[]; .http.cookies != null and .http.cookies != "")' http_cookies.json \
            && echo "[PASS] http_cookies.json: cookies has value" \
            || { echo "[FAIL] http_cookies.json: cookies is empty"; exit 1; }

          # http_proxy.json 必须有 X-Forwarded-For
          jq -s -e 'any(.[]; .http.xff != null and .http.xff != "")' http_proxy.json \
            && echo "[PASS] http_proxy.json: xff has value" \
            || { echo "[FAIL] http_proxy.json: xff is empty"; exit 1; }

      - name: jq files.log 字段检查
        run: |
          cd DeepPupils/probe/test/zeek_output
          files_json="http_http_files_files.json"
          if [ ! -s "$files_json" ]; then
            echo "[FAIL] $files_json missing or empty"
            exit 1
          fi
          # Zeek 内置 files.log: fuid / mime_type / total_bytes / seen_bytes
          jq -s -e 'any(.[]; .files.fuid != null and .files.fuid != "")' "$files_json" \
            && echo "[PASS] $files_json: fuid present" \
            || { echo "[FAIL] $files_json: fuid missing"; exit 1; }
          jq -s -e 'any(.[]; .files.mime_type != null and .files.mime_type != "")' "$files_json" \
            && echo "[PASS] $files_json: mime_type present" \
            || { echo "[FAIL] $files_json: mime_type missing"; exit 1; }
          jq -s -e 'any(.[]; .files.total_bytes > 0)' "$files_json" \
            && echo "[PASS] $files_json: total_bytes > 0" \
            || { echo "[FAIL] $files_json: total_bytes missing or zero"; exit 1; }

      - name: jq 其他协议字段检查
        run: |
          cd DeepPupils/probe/test/zeek_output

          echo "=== conn.log fields ==="
          if [ -s conn.json ]; then
            jq -s -e 'any(.[]; .conn.proto != null)' conn.json \
              && echo "[PASS] conn: proto" || { echo "[FAIL] conn: proto missing"; exit 1; }
            jq -s -e 'any(.[]; .conn.orig_bytes != null)' conn.json \
              && echo "[PASS] conn: orig_bytes" || { echo "[FAIL] conn: orig_bytes missing"; exit 1; }
            jq -s -e 'any(.[]; .conn.resp_bytes != null)' conn.json \
              && echo "[PASS] conn: resp_bytes" || { echo "[FAIL] conn: resp_bytes missing"; exit 1; }
            jq -s -e 'any(.[]; .conn.conn_state != null)' conn.json \
              && echo "[PASS] conn: conn_state" || { echo "[FAIL] conn: conn_state missing"; exit 1; }
          else
            echo "[SKIP] conn.json missing"
          fi

          echo "=== dns.log fields ==="
          if [ -s dns.json ]; then
            jq -s -e 'any(.[]; .dns.query != null)' dns.json \
              && echo "[PASS] dns: query" || { echo "[FAIL] dns: query missing"; exit 1; }
            jq -s -e 'any(.[]; .dns.qtype_name != null)' dns.json \
              && echo "[PASS] dns: qtype_name" || { echo "[FAIL] dns: qtype_name missing"; exit 1; }
            jq -s -e 'any(.[]; .dns.rcode_name != null)' dns.json \
              && echo "[PASS] dns: rcode_name" || { echo "[FAIL] dns: rcode_name missing"; exit 1; }
          else
            echo "[SKIP] dns.json missing"
          fi

          echo "=== ssh.log fields ==="
          if [ -s ssh.json ]; then
            jq -s -e 'any(.[]; .ssh.client != null)' ssh.json \
              && echo "[PASS] ssh: client" || { echo "[FAIL] ssh: client missing"; exit 1; }
            jq -s -e 'any(.[]; .ssh.server != null)' ssh.json \
              && echo "[PASS] ssh: server" || { echo "[FAIL] ssh: server missing"; exit 1; }
          else
            echo "[SKIP] ssh.json missing"
          fi

          echo "=== ssl.log fields ==="
          if [ -s ssl.json ]; then
            jq -s -e 'any(.[]; .ssl.version != null)' ssl.json \
              && echo "[PASS] ssl: version" || { echo "[FAIL] ssl: version missing"; exit 1; }
            jq -s -e 'any(.[]; .ssl.cipher != null)' ssl.json \
              && echo "[PASS] ssl: cipher" || { echo "[FAIL] ssl: cipher missing"; exit 1; }
          else
            echo "[SKIP] ssl.json missing"
          fi

  # ============================================================
  # [Job 5] pytest 精确值验证
  # ============================================================
  pytest-test:
    name: pytest精确验证
    runs-on: ubuntu-latest
    needs: zeek-analysis

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 下载 Zeek 输出
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 pytest
        run: pip install pytest

      - name: 运行 pytest
        run: |
          cd DeepPupils/probe/test
          python3 -m pytest test_http.py test_conn.py test_dns.py test_ssh.py test_ssl.py -v --tb=short

  # ============================================================
  # [Job 6] Kafka 日志输出验证
  # ============================================================
  kafka-verify:
    name: Kafka验证
    runs-on: ubuntu-latest
    needs: [build-image, unit-test]
    services:
      kafka:
        image: apache/kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_NODE_ID: 1
          KAFKA_PROCESS_ROLES: broker,controller
          KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
          KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
          KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
          KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
          KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
          CLUSTER_ID: kafka-test-cluster

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/

      - name: Install kafka-python
        run: pip install kafka-python

      - name: 运行 Kafka 验证
        timeout-minutes: 10
        run: |
          docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cd DeepPupils/probe/test/pcap
          ls -la *.pcap

          for pcap in *.pcap; do
            name=$(basename "$pcap" .pcap)
            topic="probe_${name}"
            echo "=== Kafka验证: $name (topic=$topic) ==="

            # 根据场景生成 Zeek Kafka 配置
            cfg=$(mktemp /tmp/kafka_XXXXXX.zeek)
            echo 'redef Kafka::max_wait_on_shutdown = 30000;' >> "$cfg"
            echo 'redef Kafka::tag_json = T;' >> "$cfg"
            echo 'redef Kafka::kafka_conf = table(' >> "$cfg"
            echo '    ["metadata.broker.list"] = "localhost:9092"' >> "$cfg"
            echo ');' >> "$cfg"

            case "$name" in
              http_*)
                echo "redef Kafka::topic_name = \"${topic}\";" >> "$cfg"
                echo 'event zeek_init() &priority=5 {' >> "$cfg"
                echo '    Log::add_filter(HTTP::LOG, [$name="kafka-http", $writer=Log::WRITER_KAFKAWRITER,' >> "$cfg"
                echo '        $config=table(["stream_id"]="http")]);' >> "$cfg"
                echo '}' >> "$cfg"
                scripts="/opt/probe/extend/http-extend.zeek"
                scenario="$name"
                ;;
              conn)
                echo "redef Kafka::topic_name = \"${topic}\";" >> "$cfg"
                echo 'event zeek_init() &priority=5 {' >> "$cfg"
                echo '    Log::add_filter(Conn::LOG, [$name="kafka-conn", $writer=Log::WRITER_KAFKAWRITER,' >> "$cfg"
                echo '        $config=table(["stream_id"]="conn")]);' >> "$cfg"
                echo '}' >> "$cfg"
                scripts=""
                scenario="conn"
                ;;
              dns)
                echo "redef Kafka::topic_name = \"${topic}\";" >> "$cfg"
                echo 'event zeek_init() &priority=5 {' >> "$cfg"
                echo '    Log::add_filter(DNS::LOG, [$name="kafka-dns", $writer=Log::WRITER_KAFKAWRITER,' >> "$cfg"
                echo '        $config=table(["stream_id"]="dns")]);' >> "$cfg"
                echo '}' >> "$cfg"
                scripts=""
                scenario="dns"
                ;;
              ssh)
                echo "redef Kafka::topic_name = \"${topic}\";" >> "$cfg"
                echo 'event zeek_init() &priority=5 {' >> "$cfg"
                echo '    Log::add_filter(SSH::LOG, [$name="kafka-ssh", $writer=Log::WRITER_KAFKAWRITER,' >> "$cfg"
                echo '        $config=table(["stream_id"]="ssh")]);' >> "$cfg"
                echo '}' >> "$cfg"
                scripts=""
                scenario="ssh"
                ;;
              ssl)
                echo "redef Kafka::topic_name = \"${topic}\";" >> "$cfg"
                echo 'event zeek_init() &priority=5 {' >> "$cfg"
                echo '    Log::add_filter(SSL::LOG, [$name="kafka-ssl", $writer=Log::WRITER_KAFKAWRITER,' >> "$cfg"
                echo '        $config=table(["stream_id"]="ssl")]);' >> "$cfg"
                echo '}' >> "$cfg"
                scripts=""
                scenario="ssl"
                ;;
              *)
                echo "[SKIP] $name: unknown scenario for Kafka"
                rm -f "$cfg"
                continue
                ;;
            esac

            # 运行 Zeek 离线分析，输出到 Kafka
            echo "=== Running Zeek with Kafka ==="
            docker run --rm \
              --network host \
              -v "$(pwd):/pcap:ro" \
              -v "${cfg}:/kafka.zeek:ro" \
              --entrypoint zeek \
              ${{ env.IMAGE_NAME }}:${{ github.sha }} \
              -r /pcap/${pcap} \
              ${scripts} \
              /kafka.zeek 2>&1
            zeek_exit=$?
            echo "Zeek exit code: $zeek_exit"

            # 等待 Kafka 写入完成
            sleep 5

            # 消费 Kafka + 精确值验证
            python3 ../test_kafka_output.py \
              --broker localhost:9092 \
              --topic "${topic}" \
              --scenario "${scenario}" \
              --timeout 8000
          done

  # ============================================================
  # [Job 7] 发布（预留）
  # ============================================================
  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs: [build-image, field-assertion, kafka-verify, pytest-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Placeholder
        run: echo "发布 slot 已预留"