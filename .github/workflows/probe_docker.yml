# Probe 模块化流水线
# 构建镜像 -> 单元测试（HTTP解析字段验证）-> 发布

name: Probe-构建镜像

on:
  push:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'DeepPupils/probe/**'
      - '.github/workflows/probe_docker.yml'
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cxiyuan/probe

jobs:
  # ============================================================
  # [Job 1] 构建 Docker 镜像并推送到 GHCR
  # ============================================================
  build-image:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            latest
            ${{ github.sha }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./DeepPupils/probe/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # [Job 2] 单元测试 — 生成流量 + Zeek 分析 + 字段断言 + pytest
  # ============================================================
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Scapy
        run: pip install scapy

      # ---- 生成测试流量 ----
      - name: 生成测试流量
        run: |
          mkdir -p DeepPupils/probe/test/pcap
          cd DeepPupils/probe/test
          python3 http_traffic.py -s auth -o pcap/http_auth.pcap -c 3
          python3 http_traffic.py -s proxy -o pcap/http_proxy.pcap -c 3
          python3 http_traffic.py -s cookies -o pcap/http_cookies.pcap -c 3
          python3 http_traffic.py -s body -o pcap/http_body.pcap -c 3
          python3 http_traffic.py -s headers -o pcap/http_headers.pcap -c 3
          python3 http_traffic.py -s methods -o pcap/http_methods.pcap -c 1
          python3 http_traffic.py -s status -o pcap/http_status.pcap -c 1
          python3 http_traffic.py -s boundary_large_header -o pcap/http_boundary_large_header.pcap -c 1
          python3 http_traffic.py -s boundary_large_body -o pcap/http_boundary_large_body.pcap -c 1
          python3 http_traffic.py -s boundary_special_char -o pcap/http_boundary_special_char.pcap -c 1
          python3 http_traffic.py -s boundary_mixed_encoding -o pcap/http_boundary_mixed_encoding.pcap -c 1
          ls -la pcap/

      - name: 上传流量文件
        uses: actions/upload-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/
          retention-days: 1

  # ============================================================
  # [Job 3] Zeek 分析 — 使用刚构建的 probe 镜像分析流量
  # ============================================================
  zeek-analysis:
    name: Zeek分析
    runs-on: ubuntu-latest
    needs: unit-test

    steps:
      - name: 下载流量文件
        uses: actions/download-artifact@v4
        with:
          name: http-pcaps
          path: DeepPupils/probe/test/pcap/

      - name: 创建 Zeek 输出目录
        run: mkdir -p DeepPupils/probe/test/zeek_output

      - name: 运行 Zeek 分析
        run: |
          cd DeepPupils/probe/test/pcap
          # 等待 probe 镜像构建完成并拉取
          docker pull ${{ env.IMAGE_NAME }}:latest || true
          for pcap in *.pcap; do
            name=$(basename "$pcap" .pcap)
            docker run --rm \
              -v $(pwd):/pcap \
              -v ${{ github.workspace }}/DeepPupils/probe/test/zeek_output:/output \
              ${{ env.IMAGE_NAME }}:latest \
              zeek -r "/pcap/$pcap" -j > "/output/${name}.json" 2>&1 || echo "[]" > "/output/${name}.json"
          done
          ls -la ${{ github.workspace }}/DeepPupils/probe/test/zeek_output/

      - name: 上传 Zeek 输出
        uses: actions/upload-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/
          retention-days: 1

  # ============================================================
  # [Job 4] 字段断言 — jq 批量检查字段存在性
  # ============================================================
  field-assertion:
    name: 字段断言
    runs-on: ubuntu-latest
    needs: zeek-analysis

    steps:
      - name: 下载 Zeek 输出
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/

      - name: jq 字段存在性检查
        run: |
          set -e
          echo "=== 字段存在性检查 ==="
          cd DeepPupils/probe/test/zeek_output
          for json in *.json; do
            echo "检查: $json"
            # 基础字段（任一记录有该字段即 PASS）
            jq -e 'any(.[]; .http.host != null)' "$json" && echo "  [PASS] host" || { echo "  [FAIL] host"; exit 1; }
            jq -e 'any(.[]; .http.uri != null)' "$json" && echo "  [PASS] uri" || { echo "  [FAIL] uri"; exit 1; }
            jq -e 'any(.[]; .http.user_agent != null)' "$json" && echo "  [PASS] user_agent" || { echo "  [FAIL] user_agent"; exit 1; }
            jq -e 'any(.[]; .http.status_code != null)' "$json" && echo "  [PASS] status_code" || { echo "  [FAIL] status_code"; exit 1; }
            echo "---"
          done
          echo "=== 全部字段存在性检查通过 ==="

  # ============================================================
  # [Job 5] pytest 精确值验证（可选失败不阻塞）
  # ============================================================
  pytest-test:
    name: pytest精确验证
    runs-on: ubuntu-latest
    needs: zeek-analysis
    continue-on-error: true

    steps:
      - name: 下载 Zeek 输出
        uses: actions/download-artifact@v4
        with:
          name: zeek-output
          path: DeepPupils/probe/test/zeek_output/

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装 pytest
        run: pip install pytest

      - name: 运行 pytest
        run: |
          cd DeepPupils/probe/test
          python3 -m pytest test_http.py -v --tb=short || echo "pytest 有失败用例"

  # ============================================================
  # [Job 6] 发布（预留）
  # ============================================================
  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs: [build-image, field-assertion]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Placeholder - 发布完成后处理
        run: |
          echo "发布 slot 已预留，等待实现"
          echo "可在此处添加版本打 tag、CHANGELOG 生成等"
          exit 0