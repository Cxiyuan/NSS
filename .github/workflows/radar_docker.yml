# Radar Web Crawler 流水线
# 构建镜像 -> 单元测试 -> 发布

name: Radar-构建镜像

on:
  push:
    paths:
      - 'Radar/docker/**'
      - '.github/workflows/radar_docker.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'Radar/docker/**'
      - '.github/workflows/radar_docker.yml'
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cxiyuan/radar-web-crawler

jobs:
  test:
    name: 单元测试
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Radar/docker

    steps:
      - uses: actions/checkout@v4

      - name: 安装 Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 安装服务端依赖
        run: npm install

      - name: 安装客户端依赖
        run: npm install
        working-directory: Radar/docker/client

      - name: 运行后端单元测试
        run: npm test

      - name: 构建前端（语法检查）
        run: npm run build:client

  docker-build:
    name: 构建并推送 Docker 镜像
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 提取 Docker 元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: Radar/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  integration-test:
    name: 集成验证
    needs: [docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 运行完整 API 集成测试
        timeout-minutes: 5
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ github.repository }}:sha-${{ github.sha }}"
          bash Radar/docker/server/test-integration.sh "$IMAGE" 3000
