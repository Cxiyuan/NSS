# Radar Web Crawler 流水线
# 构建镜像 -> 单元测试 -> 发布

name: Radar-构建镜像

on:
  push:
    paths:
      - 'Radar/docker/**'
      - '.github/workflows/radar_docker.yml'
    branches:
      - main

  pull_request:
    paths:
      - 'Radar/docker/**'
      - '.github/workflows/radar_docker.yml'
    branches:
      - main

  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/cxiyuan/radar-web-crawler

jobs:
  # ============================================================
  # [Job 1] 构建 Docker 镜像并推送到 GHCR
  # ============================================================
  build-image:
    name: 构建镜像
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker image
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=${{ github.sha }}
            type=raw,value=latest,enable=${{ (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./Radar/docker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CACHE_BUST=${{ github.run_id }}

  # ============================================================
  # [Job 2] 单元测试 — 使用构建镜像运行后端测试
  # ============================================================
  unit-test:
    name: 单元测试
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: 运行后端单元测试
        timeout-minutes: 5
        run: |
          docker run --rm \
            -e DB_PATH=/tmp/test.db \
            -e CI=true \
            -e PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser \
            ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            sh -c "find server -name '*.test.js' | xargs node --test"

  # ============================================================
  # [Job 3] 集成验证 — 启动服务并验证 API 端点
  # ============================================================
  integration-test:
    name: 集成验证
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: 启动容器并验证 API
        timeout-minutes: 3
        run: |
          docker run -d --name radar-test \
            -p 3000:3000 \
            -e DB_PATH=/tmp/crawler-test.db \
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

          echo "=== 等待服务就绪 ==="
          for i in $(seq 1 15); do
            if curl -s http://localhost:3000/api/tasks > /dev/null 2>&1; then
              echo "服务就绪 (${i}s)"
              break
            fi
            if [ $i -eq 15 ]; then
              echo "[FAIL] 服务启动超时"
              docker logs radar-test
              docker stop radar-test || true
              exit 1
            fi
            sleep 1
          done

          echo "=== 验证服务存活 ==="
          curl -s http://localhost:3000/api/tasks | head -50

          echo ""
          echo "=== 创建 URL 爬虫任务 ==="
          CREATE_RESULT=$(curl -s -X POST http://localhost:3000/api/tasks \
            -H 'Content-Type: application/json' \
            -d '{"type":"url_crawl","url":"https://example.com","depth":1,"concurrency":1,"filters":[]}')
          echo "$CREATE_RESULT"

          TASK_ID=$(echo "$CREATE_RESULT" | grep -o '"id":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$TASK_ID" ]; then
            echo "[FAIL] 未能创建任务"
            docker logs radar-test
            docker stop radar-test || true
            exit 1
          fi

          echo ""
          echo "=== 查询任务详情 ==="
          curl -s http://localhost:3000/api/tasks/$TASK_ID

          echo ""
          echo "[PASS] 集成验证通过"

          docker stop radar-test || true
          docker rm radar-test || true

  # ============================================================
  # [Job 4] 发布
  # ============================================================
  publish:
    name: 发布
    runs-on: ubuntu-latest
    needs: [build-image, unit-test, integration-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 确认发布
        run: |
          echo "镜像已发布到 ${{ env.IMAGE_NAME }}"
          echo "标签: sha-${{ github.sha }}, latest"
