name: Cypher CI/CD

on:
  push:
    branches: [main, develop]
    paths:
      - 'Cypher/**'
      - '.github/workflows/cypher_docker.yml'
      - 'Cypher/deploy/**'
      - 'Cypher/docker-compose.yml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'Cypher/**'
      - '.github/workflows/cypher_docker.yml'
      - 'Cypher/deploy/**'
      - 'Cypher/docker-compose.yml'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Image tag'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/cypher
  DOCKER_BUILDKIT: 1

jobs:
  lint:
    name: Lint Check
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: Cypher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Cypher/requirements.txt
      - run: |
          pip install -r requirements.txt flake8
          flake8 src/ tests/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 src/ tests/ --count --max-complexity=12 --max-line-length=100 --statistics

  unit-test:
    name: Unit Tests
    needs: lint
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: Cypher
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: Cypher/requirements.txt
      - run: |
          pip install -r requirements.txt pytest pytest-cov pytest-mock
          pytest tests/ -v --cov=src --cov-report=term-missing -m "not integration"

  docker-build:
    name: Docker Build (John AVX512)
    needs: unit-test
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=ref,event=branch
            type=raw,value=${{ github.event.inputs.tag }}
      - name: Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Cypher/deploy/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            JOHN_VERSION=bleeding-jumbo
            MAKE_FLAGS=-j$(nproc)

  integration:
    name: Integration Tests
    needs: docker-build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: |
          docker compose -f Cypher/docker-compose.yml build --no-cache
          docker compose -f Cypher/docker-compose.yml up -d
          sleep 15
          docker compose -f Cypher/docker-compose.yml ps
          docker compose -f Cypher/docker-compose.yml exec -T cypher python -m pytest tests/ -v -m integration --junitxml=/tmp/results.xml || true
          docker compose -f Cypher/docker-compose.yml down -v

  acceptance:
    name: Acceptance (AVX512)
    needs: docker-build
    if: github.ref == 'refs/heads/main'
    runs-on: [self-hosted, avx512]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build with AVX512
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Cypher/deploy/Dockerfile
          push: false
          load: true
          tags: cypher-acceptance:latest
          build-args: |
            SIMD_FLAGS=--enable-simd=AVX512
            MAKE_FLAGS=-j$(nproc)

      - name: Verify AVX512 + crack test + benchmark
        run: |
          docker run --rm cypher-acceptance:latest python3 -c "
          import subprocess, hashlib, tempfile, os

          r = subprocess.run(['john','--list=build-info'], capture_output=True,text=True)
          assert 'AVX512' in r.stdout, 'AVX512 not found!'
          print('[PASS] AVX512 verified')

          ntlm = hashlib.new('md4','CYPHER_TEST'.encode('utf-16le')).hexdigest().upper()
          hp = tempfile.mktemp(suffix='.hash')
          dp = tempfile.mktemp(suffix='.dict')
          open(hp,'w').write(f'admin:1000:no:{ntlm}:::')
          open(dp,'w').write('CYPHER_TEST\\nwrong')

          r = subprocess.run(['john',f'--wordlist={dp}','--format=ntlm',hp],
              capture_output=True,text=True)
          os.unlink(hp); os.unlink(dp)
          assert 'CYPHER_TEST' in r.stdout+r.stderr, 'Crack failed!'
          print('[PASS] NTLM crack OK')

          r = subprocess.run(['john','--test=0','--format=ntlm'],
              capture_output=True,text=True,timeout=120)
          import re
          m = re.search(r'(\\d+)\\s*c/s',r.stdout.replace(',',''))
          if m:
              speed = int(m.group(1))
              print(f'[BENCH] NTLM: {speed/1e6:.2f} MH/s')
          "

  push:
    name: Push to GHCR
    needs: [integration, acceptance]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/metadata-action@v5
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,suffix=,format=short
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: Cypher/deploy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
