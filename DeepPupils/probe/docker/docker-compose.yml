version: '3.8'

services:
  # ============================================================
  # Kafka（KRaft 模式，无 Zookeeper）
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: probe-kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      # host 网络下 probe 用 localhost:9092 连接
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: probe-cluster
    restart: unless-stopped

  # ============================================================
  # Probe — Zeek 网络探针
  # ============================================================
  probe:
    image: ghcr.io/cxiyuan/probe:latest
    container_name: probe
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /root/DeepPupils/logs:/output
    working_dir: /output
    depends_on:
      - kafka
    environment:
      # PROBE_KAFKA_BROKERS 优先，KAFKA_BROKERS 兜底
      - PROBE_KAFKA_BROKERS=${PROBE_KAFKA_BROKERS:-${KAFKA_BROKERS:-localhost:9092}}
      - PROBE_KAFKA_TOPIC=${PROBE_KAFKA_TOPIC:-probe}
      - PROBE_KAFKA_ONLY=${PROBE_KAFKA_ONLY:-true}
    command: ens192
    restart: unless-stopped
