version: '3.8'

services:
  probe:
    image: ghcr.io/cxiyuan/probe:latest
    container_name: probe
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /root/DeepPupils/logs:/output
    working_dir: /output
    # run.sh 自动加载 extend/filters/*.bpf 中的 BPF 规则
    # 以及 extend/*.zeek 中的 Zeek 扩展脚本
    # 参数：监听网卡名（默认 ens192，由 Dockerfile 的 CMD 提供）
    command: ens192
    restart: unless-stopped
