version: '3.8'

services:
  # ============================================================
  # Kafka（KRaft 模式，无 Zookeeper）
  # ============================================================
  kafka:
    image: apache/kafka:latest
    container_name: probe-kafka
    ports:
      - 9092:9092
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      CLUSTER_ID: probe-cluster
      # 日志保留 15 天（15 × 24 = 360 小时），大小不限
      KAFKA_LOG_RETENTION_HOURS: 360
      KAFKA_LOG_RETENTION_BYTES: -1
    restart: unless-stopped
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6

  # ============================================================
  # Probe — Zeek 网络探针
  # 捕获网络流量，通过 http-extend.zeek 富化 HTTP 日志，
  # 过滤组播流量，输出到 Kafka（不写本地文件）
  # ============================================================
  probe:
    build:
      context: ../docker
      dockerfile: Dockerfile
    image: ghcr.io/cxiyuan/probe:latest
    container_name: probe
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - /var/log/probe:/output
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      - PROBE_KAFKA_BROKERS=${PROBE_KAFKA_BROKERS:-localhost:9092}
      - PROBE_KAFKA_TOPIC=${PROBE_KAFKA_TOPIC:-probe}
      - PROBE_KAFKA_ONLY=true
    command: ${PROBE_INTERFACE:-ens192}
    restart: unless-stopped

volumes:
  kafka-data:
