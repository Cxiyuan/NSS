version: '3.8'

services:
  radar:
    image: ghcr.io/cxiyuan/radar-web-crawler:latest
    container_name: radar
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DB_PATH=/data/crawler.db
      - PUPPETEER_EXECUTABLE_PATH=/usr/bin/chromium-browser
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      # 可选：搜索引擎 API 密钥
      # - GOOGLE_API_KEY=your_key
      # - GOOGLE_CX=your_cx
      # - BING_API_KEY=your_key
    volumes:
      - ./data:/data
    restart: unless-stopped
    networks:
      - radar_net
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: radar-redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - radar_net

networks:
  radar_net:
    driver: bridge

volumes:
  redis_data:
    name: radar_redis_data
